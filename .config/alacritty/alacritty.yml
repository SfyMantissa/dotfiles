# Import custom theme.
import:
  - ~/.config/alacritty/dracula.yml

# Window settings.
window:
  dynamic_padding: true

  padding:
     x: 7
     y: 5
  
  scrolling:
    history: 10000
    multiplier: 3

# Font configuration.
# Fonts are taken from the output of "fc-list : family style".
font:
  size: 8

  normal:
    family: Fira Code
    style: Regular

  bold:
    family: Fira Code
    style: Bold

  italic:
    family: Fira Code
    style: Medium

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

