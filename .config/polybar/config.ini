[colors]

; Set all colors I use for my bar.
dark-blue = #111F39
dark-pink = #D75F87
grey-blue = #37456B
light-purple = #9379F3

[bar/sfy]

; Set bar background color.
background = ${colors.dark-blue}

; Set the relative positioning of modules across the bar.
modules-left = decoration bspwm xwindow
modules-right = brightness volume battery layout datetime datetime-bishkek wi-fi

; Ensure bar doesn't overlap windows in fullscreen mode.
wm-restack = bspwm

; Set pointer to look like pointing hand when positioned over interactive components.
cursor-click = pointer

; Set bar length (expands to the right).
width = 98%

; Set bar height (expands down).
height = 36

; Set offset for the bar from the left side (moves bar to the right).
offset-x = 1%

; Set offset for the bar from the top (moves bar down).
offset-y = 2%

; Set the height of the underlines used to highlight workspaces.
line-size = 4

; Set the size of invisible borders around the bar.
border-size = 2

; Set the "roundness" of bar corners.
radius = 9

; Fira Code is used to render text.
font-0 = Fira Code:pixelsize=14;5

; Symbols Nerd Font is used to render icons.
; Icons for copy/paste could be found here: https://www.nerdfonts.com/cheat-sheet
font-1 = Symbols Nerd Font:pixelsize=18;6

; Sazanami Gothic is used to render japanese text.
font-2 = Sazanami Gothic:pixelsize=20;3

[module/decoration]
content-background = ${colors.grey-blue}
content-foreground = ${colors.dark-blue}
type = custom/text

; Decoration for my bar with japanese text :)
; ゆうかんさ (yuukansa) means "bravery".
content = ゆうかんさ

; Sets padding for text from both sides.
content-padding = 2

[module/bspwm]
ws-icon-foreground = ${colors.grey-blue}
label-focused-underline = ${colors.grey-blue}
type = internal/bspwm
label-focused = %icon%
label-occupied = %icon%
label-urgent = %icon%
label-empty = %icon%
label-focused-padding = 1
label-occupied-padding = 1
label-urgent-padding = 1
label-empty-padding = 1
label-separator = " "
format = <label-state>
ws-icon-0 =1;%{F#37456B}
ws-icon-1 =2;%{F#37456B}
ws-icon-2 =3;%{F#37456B}
ws-icon-3 =4;%{F#37456B}
ws-icon-4 =5;%{F#37456B}ﭮ

[module/xwindow]
type = internal/xwindow
label = %title%
label-empty = "Desktop"

; Set the maximum length of label.
label-maxlen = 30
label-padding-left = 2
label-empty-padding-left = 2

[module/brightness]
type = internal/backlight

; From polybar docs:
; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight
label = %percentage%%
format = <ramp>  <label>
ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 

[module/volume]
label-muted-foreground = ${colors.dark-pink}
type = internal/pulseaudio
label-muted  = ﱝ  %percentage%%
format-volume = <ramp-volume>  <label-volume>
format-muted = <label-muted>
format-volume-padding = 2
format-muted-padding = 2
ramp-volume-0 = 
ramp-volume-1 = 奔
ramp-volume-2 = 墳
ramp-volume-3 = 

; From polybar docs:
; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = false

[module/battery]
ramp-capacity-0-foreground = ${colors.dark-pink}
ramp-capacity-9-foreground = ${colors.light-purple}
type = internal/battery
label-charging =  %percentage%%
format-charging = <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-5 = 
ramp-capacity-6 = 
ramp-capacity-7 = 
ramp-capacity-8 = 
ramp-capacity-9 = 

; From polybar docs:
; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = AC0
full-at = 95

[module/layout]
label-indicator-on-foreground = ${colors.light-purple}
type = internal/xkeyboard
label-layout = %icon%  %layout%
label-indicator-on = %icon%
label-indicator-off = %icon%
label-layout-padding-left = 2
format = <label-layout> <label-indicator>
blacklist-0 = num lock
blacklist-1 = scroll lock
indicator-icon-0 = caps lock;ﰬ;ﰵ
layout-icon-default = 

[module/datetime]
type = internal/date
label =   %date%
label-padding-left = 2
label-padding-right = 1
date = "%{A1: .config/polybar/polybar-calendar/calendar.sh:}%a %Y-%m-%d M %T%{A}"

[module/datetime-bishkek]
type = custom/script
label-padding-right = 3
exec = TZ=Asia/Bishkek date +"B %T"

[module/wi-fi]
label-connected-foreground = ${colors.light-purple}
label-disconnected-foreground = ${colors.dark-pink}
type = internal/network
label-connected = 直
label-disconnected = 睊
label-connected-padding-right = 4
label-disconnected-padding-right = 4
format-connected = <label-connected>
format-disconnected = <label-disconnected>

; From polybar docs:
; Name of the network interface to display. You can get the names of the
; interfaces on your machine with `ip link`
; Wireless interfaces often start with `wl` and ethernet interface with `eno` or `eth`
interface = wlp0s20f3
